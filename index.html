<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>CODM PRO LAB</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Orbitron;
background: radial-gradient(circle at top,#0f172a,#020617);
color:white;
}

header{
text-align:center;
padding:20px;
font-size:32px;
letter-spacing:4px;
border-bottom:2px solid cyan;
text-shadow:0 0 10px cyan;
}

nav{
display:flex;
justify-content:center;
gap:20px;
margin:20px;
flex-wrap:wrap;
}

.button{
background:linear-gradient(90deg,#06b6d4,#3b82f6);
padding:10px 20px;
border-radius:8px;
cursor:pointer;
transition:0.2s;
}

.button:hover{
transform:scale(1.1);
box-shadow:0 0 15px cyan;
}

.section{
display:none;
padding:30px;
}

.active{
display:block;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
}

.card{
background:#0b1220;
border:1px solid #1f2937;
border-radius:12px;
padding:20px;
box-shadow:0 0 20px rgba(0,255,255,0.1);
}

.map{
position:relative;
width:700px;
}

.marker{
position:absolute;
font-size:22px;
cursor:pointer;
}

.target{
width:40px;
height:40px;
background:red;
border-radius:50%;
position:absolute;
cursor:pointer;
box-shadow:0 0 10px red;
}

canvas{
background:#020617;
border:1px solid cyan;
}

</style>
</head>

<body>

<header>🎮 CODM PRO LAB</header>

<nav>

<div class="button" onclick="showSection('weapons')">Weapons</div>
<div class="button" onclick="showSection('hud')">HUD</div>
<div class="button" onclick="showSection('maps')">Maps</div>
<div class="button" onclick="showSection('trainer')">Aim Trainer</div>
<div class="button" onclick="showSection('recoil')">Recoil</div>
<div class="button" onclick="showSection('circle')">Circle AI</div>

</nav>

<!-- WEAPONS -->

<div id="weapons" class="section active">

<h2>🔫 Weapon Database</h2>

<div id="weaponList" class="grid"></div>

</div>

<!-- HUD -->

<div id="hud" class="section">

<h2>🎮 Pro HUD Layouts</h2>

<div id="hudList" class="grid"></div>

</div>

<!-- MAP -->

<div id="maps" class="section">

<h2>🗺 Interactive Map</h2>

<div class="map">

<img src="https://i.imgur.com/tY9gO0H.jpeg" width="700">

<div class="marker" style="top:40%;left:60%">🎯</div>
<div class="marker" style="top:50%;left:20%">🟢</div>
<div class="marker" style="top:30%;left:35%">💰</div>

</div>

</div>

<!-- AIM TRAINER -->

<div id="trainer" class="section">

<h2>🎯 Aim Trainer</h2>

<p>Score: <span id="score">0</span></p>

<button class="button" onclick="spawn()">Start</button>

</div>

<!-- RECOIL -->

<div id="recoil" class="section">

<h2>🔫 Recoil Simulator</h2>

<select id="gunSelect"></select>

<br><br>

<canvas id="canvas" width="400" height="400"></canvas>

<br><br>

<button class="button" onclick="simulateRecoil()">ยิงปืน</button>

</div>

<!-- CIRCLE AI -->

<div id="circle" class="section">

<h2>🧠 Battle Royale Circle Predictor</h2>

<button class="button" onclick="predictCircle()">Predict Next Circle</button>

<h3 id="circleResult"></h3>

</div>

<script>

function showSection(id){

document.querySelectorAll(".section")
.forEach(s=>s.classList.remove("active"))

document.getElementById(id).classList.add("active")

}

const weapons=[

{
name:"M13",
type:"Assault Rifle",
damage:24,
fire_rate:88,
accuracy:56,
mobility:72,
range:56,
control:43,
pro_build:[
"Monolithic Suppressor",
"RTC Heavy Barrel",
"No Stock",
"OWC Tactical Laser",
"Granulated Grip"
],
recoil:[[0,-5],[1,-7],[-1,-9],[2,-12],[-2,-14]]
},

{
name:"Kilo 141",
type:"Assault Rifle",
damage:29,
fire_rate:68,
accuracy:57,
mobility:79,
range:54,
control:55,
pro_build:[
"Tactical Suppressor",
"MIP Extended Light Barrel",
"Ranger Foregrip",
"Granulated Grip Tape",
"Large Extended Mag"
],
recoil:[[0,-6],[1,-9],[-1,-11],[2,-14]]
},

{
name:"AK47",
type:"Assault Rifle",
damage:33,
fire_rate:55,
accuracy:67,
mobility:74,
range:58,
control:44,
pro_build:[
"OWC Ranger",
"Strike Foregrip",
"Extended Mag",
"Granulated Grip",
"Tactical Laser"
],
recoil:[[0,-8],[2,-10],[-2,-12]]
},

{
name:"DLQ33",
type:"Sniper",
damage:90,
fire_rate:28,
accuracy:85,
mobility:50,
range:90,
control:70,
pro_build:[
"OWC Tactical Laser",
"Extended Mag",
"Stippled Grip"
],
recoil:[[0,-15]]
}

]

let weaponList=document.getElementById("weaponList")

weapons.forEach(w=>{

let div=document.createElement("div")
div.className="card"

div.innerHTML=`
<h3>${w.name}</h3>
<p>${w.type}</p>
<p>Damage: ${w.damage}</p>
<ul>${w.pro_build.map(a=>"<li>"+a+"</li>").join("")}</ul>
`

weaponList.appendChild(div)

})

let select=document.getElementById("gunSelect")

weapons.forEach(w=>{

let opt=document.createElement("option")
opt.value=w.name
opt.innerText=w.name

select.appendChild(opt)

})

function simulateRecoil(){

let gun=weapons.find(g=>g.name===select.value)

let canvas=document.getElementById("canvas")
let ctx=canvas.getContext("2d")

ctx.clearRect(0,0,400,400)

let x=200
let y=300

ctx.beginPath()
ctx.moveTo(x,y)

gun.recoil.forEach(p=>{

x+=p[0]*5
y+=p[1]

ctx.lineTo(x,y)

})

ctx.strokeStyle="cyan"
ctx.lineWidth=3
ctx.stroke()

}

const hud=[

{
name:"4 Finger Pro",
image:"https://i.imgur.com/0v5XK0U.png",
description:"Competitive claw layout"
},

{
name:"6 Finger Pro",
image:"https://i.imgur.com/0v5XK0U.png",
description:"Tournament layout"
}

]

let hudList=document.getElementById("hudList")

hud.forEach(h=>{

let div=document.createElement("div")

div.className="card"

div.innerHTML=`
<h3>${h.name}</h3>
<img src="${h.image}" width="200">
<p>${h.description}</p>
`

hudList.appendChild(div)

})

let score=0

function spawn(){

let target=document.createElement("div")

target.className="target"

target.style.left=Math.random()*window.innerWidth+"px"
target.style.top=Math.random()*window.innerHeight+"px"

target.onclick=()=>{

score++

document.getElementById("score").innerText=score

target.remove()

spawn()

}

document.body.appendChild(target)

}

function predictCircle(){

let directions=["North","South","East","West"]

let dir=directions[Math.floor(Math.random()*4)]

let prob=Math.floor(Math.random()*40)+40

document.getElementById("circleResult").innerText=
"Next Circle → "+dir+" ("+prob+"%)"

}

</script>

</body>
</html>
