<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Gaming Topup Platform</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#020617);
color:white;
overflow-x:hidden;
}

/* background animation */

body:before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:
radial-gradient(circle at 20% 30%,#1e293b,transparent),
radial-gradient(circle at 80% 70%,#0ea5e9,transparent);
animation:bgmove 10s infinite alternate;
z-index:-1;
}

@keyframes bgmove{

0%{transform:scale(1)}
100%{transform:scale(1.3)}

}

header{

text-align:center;
padding:30px;
font-size:35px;
font-weight:bold;

}

nav{

display:flex;
justify-content:center;
gap:20px;
margin-bottom:20px;

}

button{

padding:10px 20px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
cursor:pointer;
font-size:15px;

}

button:hover{

background:#16a34a;
transform:scale(1.05);

}

#games{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:30px;

}

.game{

background:#1e293b;
padding:20px;
border-radius:12px;
text-align:center;
transition:0.3s;

}

.game:hover{

transform:translateY(-5px);
background:#334155;

}

.dashboard{

padding:30px;
display:none;

}

.card{

background:#1e293b;
padding:20px;
border-radius:10px;
margin:10px;

}

</style>

</head>

<body>

<header>
🎮 GAMING TOPUP PLATFORM
</header>

<nav>

<button onclick="showGames()">🎮 Games</button>
<button onclick="showDashboard()">📊 Dashboard</button>
<button onclick="login()">👤 Login</button>

</nav>

<div id="games"></div>

<div id="dashboard" class="dashboard">

<div class="card">
💰 รายได้วันนี้: <span id="income">0</span> บาท
</div>

<div class="card">
🎮 จำนวนออเดอร์: <span id="orders">0</span>
</div>

</div>

<script>

let income=0
let orders=0

const games=[

"Free Fire",
"Roblox",
"PUBG Mobile",
"Call of Duty Mobile",
"ROV",
"Genshin Impact",
"Mobile Legends",
"Honkai Star Rail",
"Valorant",
"Steam Wallet",
"Clash of Clans",
"Clash Royale",
"FIFA Mobile",
"League of Legends",
"Apex Legends",
"Fortnite",
"Garena Undawn",
"Dragon Raja",
"Tower of Fantasy",
"Black Desert Mobile"

]

function showGames(){

document.getElementById("dashboard").style.display="none"

let html=""

games.forEach(g=>{

html+=`

<div class="game">

<h3>${g}</h3>

<button onclick="topup('${g}')">
💳 เติมเงิน
</button>

</div>

`

})

document.getElementById("games").innerHTML=html

}

function showDashboard(){

document.getElementById("games").innerHTML=""

document.getElementById("dashboard").style.display="block"

document.getElementById("income").innerText=income
document.getElementById("orders").innerText=orders

}

function topup(game){

let amount=prompt("เติมเงิน "+game+" จำนวนบาท")

if(!amount)return

alert("สร้าง QR PromptPay สำหรับ "+amount+" บาท")

income+=parseInt(amount)
orders++

}

function login(){

let user=prompt("Username")

if(user){

alert("ยินดีต้อนรับ "+user)

}

}

showGames()

</script>

</body>
</html>
